services:
  nethunt-mcp-http:
    build:
      context: .
    image: nethunt-mcp:latest
    restart: unless-stopped
    env_file:
      - path: .env.runtime
        format: raw
    environment:
      MCP_TRANSPORT: streamable-http
      MCP_HOST: 0.0.0.0
      MCP_PORT: 18044
    ports:
      - "18044:18044"
