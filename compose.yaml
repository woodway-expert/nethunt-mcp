services:
  nethunt-mcp-http:
    build:
      context: .
    image: nethunt-mcp:latest
    restart: unless-stopped
    env_file:
      - path: .env
        format: raw
    environment:
      MCP_TRANSPORT: streamable-http
      MCP_HOST: 0.0.0.0
      MCP_PORT: 18044
    ports:
      - "18044:18044"
  nethunt-telegram-bot:
    image: nethunt-mcp:latest
    restart: unless-stopped
    depends_on:
      - nethunt-mcp-http
    env_file:
      - path: .env
        format: raw
    environment:
      TELEGRAM_MCP_URL: http://nethunt-mcp-http:18044/mcp
    entrypoint:
      - nethunt-telegram-bot
